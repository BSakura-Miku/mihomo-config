# Loon 配置模板 - iPhone
# 作者: https://github.com/BSakura-Miku
# 项目地址: https://github.com/BSakura-Miku/mihomo-config
# Loon Ver.1.6 (2026-06-23)
# 最后更新: 2026-06-23
# 隐私说明: 本发布版已移除远程订阅、VLESS/Trojan/SS 节点、WireGuard 私钥与 endpoint。
# Loon 官方文档: https://nsloon.app/docs/intro
# Loon 规则GitHub: https://github.com/blackmatrix7/ios_rule_script/tree/master/rule/Loon

# 更多的插件可以前往此处安装 https://github.com/luestr/ProxyResource/blob/main/README.md

[General]
doh-server = https://223.5.5.5/dns-query,https://223.6.6.6/dns-query
ip-mode = v4-only
# IP 模式: ipv4-only: 只使用 IPv4 进行请求, 不发起 AAAA 的 DNS 查询, 拒绝所有 IPv6 连接
# dual: 并发发起 A 和 AAAA 的 DNS 查询, 优先使用响应速度更快的结果, 不判断是否是IPv4或者IPv6
# ipv4-preferred: 并发发起 A 和 AAAA 的 DNS 查询, 优先使用 IPv6 结果, 如无 IPv6 记录则切换到 IPv4 结果
# ipv6-Preferred: 并发发起 A 和 AAAA 的 DNS 查询, 优先使用 IPv4 结果, 如无 IPv4 记录则切换到 IPv6 结果
ipv6-vif = auto
dns-server = system
sni-sniffing = true
disable-stun = false
dns-reject-mode = LoopbackIP
# DNS: 使用 LoopbackIP、No Answer 或 NXDomain 的方式阻止 DNS 查询以达到拦截请求的目的
# Request: 在请求转发阶段拦截请求
# > 在 HTTP Proxy & TUN 模式下由于拦截到的系统 DNS 较少, 大部分的拦截都会在转发请求阶段进行。
domain-reject-mode = DNS
udp-fallback-mode = REJECT
# Wi-Fi 访问
allow-wifi-access = false
wifi-access-http-port = 7222
wifi-access-socks5-port = 7221

interface-mode = auto
# Auto: 系统自动分配
# Cellular: 在WiFi和蜂窝数据都开启的情况下指定使用蜂窝网络
# Performace: 在WiFi和蜂窝数据都开启的情况下使用最优的网络接口
# Balance: 在WiFi和蜂窝数据都开启的情况下, 均衡使用网络接口
test-timeout = 5
disconnect-on-policy-change = false
internet-test-url = http://captive.apple.com
# 网络连通性测试 URL
proxy-test-url = http://www.gstatic.com/generate_204
# 代理测试 URL 如果策略组没有自定义测试链接就会使用这里配置的
resource-parser = https://raw.githubusercontent.com/sub-store-org/Sub-Store/release/sub-store-parser.loon.min.js
# 节点订阅/解析器
geoip-url = https://geodata.kelee.one/Country-Masaiki.mmdb
# GeoIP 数据库 (国家)
ipasn-url = https://geodata.kelee.one/GeoLite2-ASN-P3TERX.mmdb
# ASN 数据库 (自治系统)
skip-proxy = 192.168.0.0/16,10.0.0.0/24,172.16.0.0/12,localhost,*.local,e.crashlynatics.com
# 跳过代理的地址 (常见内网、保留地址、本地主机)
bypass-tun = 10.0.0.0/24,100.64.0.0/10,127.0.0.0/8,169.254.0.0/16,172.16.0.0/12,192.0.0.0/24,192.0.2.0/24,192.88.99.0/24,192.168.0.0/16,198.51.100.0/24,203.0.113.0/24,224.0.0.0/4,255.255.255.255/32
# 绕过 TUN 的地址段 (常见内网、保留地址、组播、广播)
# ssid-trigger参数, 用于指定SSID下流量模式切换,  (default表示默认, cellular表示蜂窝, 目前支持三种值: rule, direct, proxy)
ssid-trigger = "default":rule, "cellular":rule, "<HOME_WIFI_SSID>":direct


[Proxy]
# 单个代理节点配置区域
# 在这里定义手写节点。公开模板不包含真实节点。
# example-vless = VLESS,example.com,443,"<UUID>",transport=tcp,public-key="<PUBLIC_KEY>",short-id=<SHORT_ID>,udp=true,over-tls=true,sni=www.example.com
# home = wireguard,interface-ip=10.66.0.10,private-key="<WIREGUARD_PRIVATE_KEY>",mtu=1420,dns=10.10.2.4,keepalive=25,peers=[{public-key="<PUBLIC_KEY>",allowed-ips="10.66.0.0/24,10.10.2.0/24",endpoint=<SERVER_HOST>:51820}]

[Remote Proxy]
# 远程节点订阅配置
# 用于从机场订阅拉取节点。公开模板只保留写法示例。
provider-main = https://example.com/subscription/main?token=REDACTED,parser-enabled = true,udp=true,block-quic=false,fast-open=default,vmess-aead=true,skip-cert-verify=false,enabled=true,flexible-sni=false
provider-backup = https://example.com/subscription/backup?token=REDACTED,parser-enabled = true,udp=true,block-quic=false,fast-open=default,vmess-aead=true,skip-cert-verify=false,enabled=false,flexible-sni=false

[Remote Filter]
# 远程规则集过滤器
# 可以对远程订阅的节点进行筛选 (例如只保留某地区节点)
# 格式: 名字 = 订阅名字, 筛选条件 (正则/关键字)
# (?i): 表示后面整个括号内的表达式不区分大小写
HK = NameRegex, FilterKey = "^(?=.*((?i)🇭🇰|香港|(\b(HK|HKG|Hong)(\d+)?\b)))(?!.*((?i)免费|下载|直连|回国|校园|游戏|🎮|(\b(GAME)\b))).*$"
TW = NameRegex, FilterKey = "^(?=.*((?i)🇹🇼|台湾|(\b(TW|TWN|Tai|Taiwan)(\d+)?\b)))(?!.*((?i)免费|下载|直连|回国|校园|游戏|🎮|(\b(GAME)\b))).*$"
JP = NameRegex, FilterKey = "^(?=.*((?i)🇯🇵|日本|川日|东京|大阪|泉日|埼玉|(\b(JP|JPN|Japan)(\d+)?\b)))(?!.*((?i)免费|下载|直连|回国|校园|游戏|🎮|(\b(GAME)\b))).*$"
KR = NameRegex, FilterKey = "^(?=.*((?i)🇰🇷|韩国|韓|首尔|(\b(KR|KOR|Korea)(\d+)?\b)))(?!.*((?i)免费|下载|直连|回国|校园|游戏|🎮|(\b(GAME)\b))).*$"
SG = NameRegex, FilterKey = "^(?=.*((?i)🇸🇬|新加坡|狮|(\b(SG|SGP|Singapore)(\d+)?\b)))(?!.*((?i)免费|下载|直连|回国|校园|游戏|🎮|(\b(GAME)\b))).*$"
US = NameRegex, FilterKey = "^(?=.*((?i)🇺🇸|美国|波特兰|达拉斯|俄勒冈|凤凰城|费利蒙|硅谷|拉斯维加斯|洛杉矶|圣何塞|圣克拉拉|西雅图|芝加哥|(\b(US|USA|United States)(\d+)?\b)))(?!.*((?i)免费|下载|直连|回国|校园|游戏|🎮|(\b(GAME)\b))).*$"
GM = NameRegex, FilterKey = "^(?=.*((?i)游戏|🎮|(\b(GAME)(\d+)?\b)))(?!.*((?i)免费|下载|直连|回国|校园)).*$"
All = NameRegex, FilterKey = "^(?=.*(.))(?!.*((?i)免费|下载|群|邀请|返利|循环|官网|客服|网站|网址|获取|订阅|流量|到期|机场|下次|版本|官址|备用|过期|已用|联系|邮箱|工单|贩卖|通知|倒卖|防止|国内|地址|频道|无法|说明|使用|提示|特别|访问|支持|教程|关注|更新|作者|加入|超时|收藏|福利|邀请|好友|(\b(USE|USED|TOTAL|EXPIRE|EMAIL|Panel|Channel|Author|Traffic)(\d+)?\b|(\d{4}-\d{2}-\d{2}|\dG)))).*$"

