[Rule]
DOMAIN-KEYWORD,bs-ugnas,DIRECT
IP-CIDR,10.10.2.0/24,home,no-resolve
IP-CIDR,10.66.0.0/24,home,no-resolve
# 规则设置
# 定义不同流量的分流策略 (走直连、走代理、还是拒绝)
# 格式一般是:
#   RULE-SET,规则集名称,策略组名称
#   DOMAIN,域名,策略组
#   IP-CIDR,IP段,策略组
#   GEOIP,国家,策略组
# Local Rule
# Type:DOMAIN-SUFFIX,DOMAIN,DOMAIN-KEYWORD,USER-AGENT,URL-REGEX,IP-CIDR,IP-CIDR6,IP-ASN
# Strategy:DIRECT,Proxy,REJECT
# Options:no-resolve(no-resolve(only for cidr))
# IP-CIDR, 192.168.0.0/16, DIRECT
# IP-CIDR, 10.0.0.0/8, DIRECT
# IP-CIDR, 172.16.0.0/12, DIRECT
# IP-CIDR, 127.0.0.0/8, DIRECT
# 当配置文件中没有任何有效策略组时, Loon将使用内置的PROXY策略组
# 当配置文件中存在有效的策略组时, 内置的PROXY策略组将不再允许被调用, 仅可使用用户配置的策略组
# 配置文件已自带远程GEOIP, cn, DIRECT规则, 请勿在此添加
# 请勿修改远程CN REGION规则的排序甚至删除
# 信息收集
URL-REGEX,"\.log\.",REJECT
# 兜底策略
FINAL,Final


